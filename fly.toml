app = "hubudash"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "hubudash_data"
  destination = "/app/data"

[env]
  DB_PATH = "/app/data/hubudash.db"
